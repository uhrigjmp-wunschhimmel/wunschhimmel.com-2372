<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etwas ist schiefgelaufen – Wunschhimmel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #FDF8FC;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .card {
      background: #fff;
      border: 1px solid #F0D5E5;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(210,59,114,.10);
      padding: 48px 40px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .code {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 72px;
      font-weight: 700;
      background: linear-gradient(135deg, #4A90D9, #122050);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-top: 4px;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: #122050;
      margin: 12px 0 16px;
      line-height: 1.4;
    }
    p {
      font-size: 15px;
      color: #5A3A4A;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, #F25990, #B02558);
      color: #fff;
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(210,59,114,.30);
    }
    .btn-ghost {
      display: inline-block;
      background: #FFF0F5;
      border: 1px solid #FFB3D1;
      color: #B02558;
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .stars-bg { position: absolute; inset: 0; pointer-events: none; }
    .star { position: absolute; color: #4A90D9; opacity: 0.18; animation: drift 6s ease-in-out infinite; }
    .star-1  { top: 8%;  left: 7%;  font-size: 18px; animation-delay: 0s; }
    .star-2  { top: 15%; left: 85%; font-size: 12px; animation-delay: 0.8s; }
    .star-3  { top: 30%; left: 92%; font-size: 20px; animation-delay: 1.6s; }
    .star-4  { top: 60%; left: 5%;  font-size: 10px; animation-delay: 2.4s; }
    .star-5  { top: 75%; left: 88%; font-size: 16px; animation-delay: 0.4s; }
    .star-6  { top: 88%; left: 15%; font-size: 14px; animation-delay: 3.2s; }
    .star-7  { top: 5%;  left: 45%; font-size: 10px; animation-delay: 1.2s; }
    .star-8  { top: 45%; left: 2%;  font-size: 22px; animation-delay: 2.0s; }
    @keyframes drift {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.18; }
      50%       { transform: translateY(-8px) rotate(15deg); opacity: 0.35; }
    }
    @media(max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .code { font-size: 56px; }
      h1 { font-size: 19px; }
      .actions { flex-direction: column; align-items: center; }
      .btn-primary, .btn-ghost { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="stars-bg" aria-hidden="true">
    <span class="star star-1">✦</span>
    <span class="star star-2">✧</span>
    <span class="star star-3">⋆</span>
    <span class="star star-4">✦</span>
    <span class="star star-5">✧</span>
    <span class="star star-6">⋆</span>
    <span class="star star-7">✦</span>
    <span class="star star-8">✧</span>
  </div>

  <div class="card">
    <div class="icon">🌙</div>
    <div class="code">500</div>
    <h1>Kurze Wolke vor dem Mond –<br>gleich wieder klar ✨</h1>
    <p>
      Bei uns ist gerade etwas schiefgelaufen. Wir sind schon dabei,
      es zu beheben. Bitte versuche es in einem Moment nochmal.
    </p>
    <div class="actions">
      <a href="/" class="btn-primary">Zur Startseite</a>
      <button class="btn-ghost" onclick="location.reload()">Nochmal versuchen</button>
    </div>
  </div>
</body>
</html>
